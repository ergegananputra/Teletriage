services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: teletriage_backend
    ports:
      - "6502:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: always

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: teletriage_frontend
    ports:
      - "6501:8501"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./:/app
    depends_on:
      backend:
        condition: service_healthy
    restart: always